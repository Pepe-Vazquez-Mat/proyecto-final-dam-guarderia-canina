<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mascotas - Guardería Canina</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<header class="header">
    <div class="container">
        <h1>Guardería Canina</h1>
        <nav class="nav">
            <a href="/index.html">Inicio</a>
            <a href="/mascotas.html" class="activo">Mascotas</a>
            <a href="/reservas.html">Reservas</a>
        </nav>
    </div>
</header>

<main class="container">

    <!-- FORMULARIO -->
    <section class="panel">
        <h2>Nueva mascota</h2>

        <form id="formMascota" class="formulario">

            <div class="form-group">
                <label>ID Usuario</label>
                <input type="number" id="usuarioId" required>
            </div>

            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="nombre" required>
            </div>

            <div class="form-group">
                <label>Raza</label>
                <input type="text" id="raza">
            </div>

            <div class="form-group">
                <label>Peso (kg)</label>
                <input type="number" id="pesoKg" step="0.1">
            </div>

            <div class="form-group">
                <label>Edad (años)</label>
                <input type="number" id="edadAnios">
            </div>

            <div class="form-group full">
                <label>Observaciones</label>
                <textarea id="observaciones"></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn">Guardar mascota</button>
                <button type="reset" class="btn btn-secundario">Limpiar</button>
            </div>
        </form>

        <p id="mensaje" class="mensaje"></p>
    </section>

    <!-- LISTADO -->
    <section class="panel">
        <div class="cabecera-listado">
            <h2>Listado de mascotas</h2>
            <button id="btnRecargar" class="btn">Recargar</button>
        </div>

        <div id="listaMascotas" class="grid-reservas">
            <p>Cargando mascotas...</p>
        </div>
    </section>

</main>

<script src="/js/mascotas.js"></script>
</body>
</html>
