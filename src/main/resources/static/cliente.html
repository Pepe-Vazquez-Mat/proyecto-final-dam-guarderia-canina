<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área Cliente - Guardería Canina</title>
    <link rel="stylesheet" href="css/cliente.css">
</head>
<body>

<div class="contenedor-principal">
    <header class="topbar">
        <div>
            <h1>Guardería Canina</h1>
            <p id="saludoUsuario">Área privada del cliente</p>
        </div>
        <button id="btnCerrarSesion" class="btn btn-secundario">Cerrar sesión</button>
    </header>

    <main class="grid-principal">

        <!-- FORMULARIO MASCOTAS -->
        <section class="card">
            <div class="card-header">
                <h2 id="tituloFormularioMascota">Añadir mascota</h2>
                <p>Gestiona los datos de tus mascotas</p>
            </div>

            <form id="formMascota" class="formulario">
                <input type="hidden" id="mascotaId">

                <div class="campo">
                    <label for="nombreMascota">Nombre</label>
                    <input type="text" id="nombreMascota" required>
                </div>

                <div class="campo">
                    <label for="razaMascota">Raza</label>
                    <input type="text" id="razaMascota">
                </div>

                <div class="campo-grid">
                    <div class="campo">
                        <label for="pesoMascota">Peso (kg)</label>
                        <input type="number" id="pesoMascota" step="0.1" min="0">
                    </div>

                    <div class="campo">
                        <label for="edadMascota">Edad (años)</label>
                        <input type="number" id="edadMascota" min="0">
                    </div>
                </div>

                <div class="campo">
                    <label for="observacionesMascota">Observaciones</label>
                    <textarea id="observacionesMascota" rows="4" placeholder="Alergias, comportamiento, medicación, etc."></textarea>
                </div>

                <div class="acciones-formulario">
                    <button type="submit" class="btn btn-primario" id="btnGuardarMascota">Guardar mascota</button>
                    <button type="button" class="btn btn-secundario oculto" id="btnCancelarEdicion">Cancelar edición</button>
                </div>
            </form>

            <div id="mensajeMascota" class="mensaje"></div>
        </section>

        <!-- LISTADO MASCOTAS -->
        <section class="card">
            <div class="card-header">
                <h2>Mis mascotas</h2>
                <p>Listado de mascotas registradas</p>
            </div>

            <div id="contenedorMascotas" class="lista-cards">
                <p class="texto-suave">Cargando mascotas...</p>
            </div>
        </section>

        <!-- FORMULARIO RESERVAS -->
        <section class="card">
            <div class="card-header">
                <h2>Nueva reserva</h2>
                <p>Solicita una estancia para una de tus mascotas</p>
            </div>

            <form id="formReserva" class="formulario">
                <div class="campo">
                    <label for="mascotaReserva">Mascota</label>
                    <select id="mascotaReserva" required>
                        <option value="">Selecciona una mascota</option>
                    </select>
                </div>

                <div class="campo-grid">
                    <div class="campo">
                        <label for="fechaEntrada">Fecha entrada</label>
                        <input type="date" id="fechaEntrada" required>
                    </div>

                    <div class="campo">
                        <label for="fechaSalida">Fecha salida</label>
                        <input type="date" id="fechaSalida" required>
                    </div>
                </div>

                <div class="campo">
                    <label for="tipoReserva">Tipo de estancia</label>
                    <select id="tipoReserva">
                        <option value="GUARDERIA_DIA">Guardería de día</option>
                        <option value="ESTANCIA_LARGA">Estancia larga</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="observacionesReserva">Observaciones</label>
                    <textarea id="observacionesReserva" rows="4" placeholder="Horario, medicación, necesidades especiales, etc."></textarea>
                </div>

                <div class="acciones-formulario">
                    <button type="submit" class="btn btn-primario">Crear reserva</button>
                </div>
            </form>

            <div id="mensajeReserva" class="mensaje"></div>
        </section>

        <!-- LISTADO RESERVAS -->
        <section class="card">
            <div class="card-header">
                <h2>Mis reservas</h2>
                <p>Consulta y elimina tus reservas</p>
            </div>

            <div id="contenedorReservas" class="lista-cards">
                <p class="texto-suave">Cargando reservas...</p>
            </div>
        </section>

    </main>
</div>

<script src="js/cliente.js"></script>
</body>
</html>
