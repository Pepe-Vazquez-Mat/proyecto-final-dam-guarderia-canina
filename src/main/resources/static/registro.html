<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Guardería Canina</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/registro.css">
</head>
<body>

<main class="registro-page">
    <section class="registro-card">
        <h1>Crear cuenta</h1>
        <p class="registro-subtitle">Accede a la guardería canina</p>

        <form id="registroForm" class="registro-form">

            <div class="campo">
                <label>Nombre</label>
                <input type="text" id="nombre" required>
            </div>

            <div class="campo">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>

            <div class="campo">
                <label>Contraseña</label>
                <input type="password" id="password" required>
            </div>

            <button type="submit" class="btn btn-primary">Registrarse</button>
        </form>

        <div id="mensaje" class="mensaje-registro"></div>

        <p class="registro-extra">
            ¿Ya tienes cuenta?
            <a href="/login.html">Inicia sesión</a>
        </p>

    </section>
</main>

<script src="js/registro.js"></script>
</body>
</html>
